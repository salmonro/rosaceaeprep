<!DOCTYPE html>
<html>

<head>
  <title>USABO Practice</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26);
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      margin: 0;
    }

    nav {
      margin-bottom: 50px;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0;
      margin: 0;
    }

    nav a {
      color: #d47a9a;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #c75c85;
    }

    h1 {
      font-size: 70px;
      color: #d47a9a;
      margin-bottom: 20px;
    }

    select {
      padding: 8px 12px;
      font-family: 'Rubik', Arial, sans-serif;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: none;
      background: #151a2e;
      color: white;
      cursor: pointer;
    }

    button {
      background: #d47a9a;
      border: none;
      padding: 10px 18px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 500;
      transition: background 0.3s;
      margin-top: 20px;
    }

    button:hover {
      background: #c75c85;
    }

    #answers {
      margin-top: 20px;
    }

    .answer {
      display: block;
      margin: 10px auto;
      padding: 10px;
      background: #151a2e;
      border-radius: 6px;
      cursor: pointer;
      max-width: 400px;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 400;
      transition: background 0.3s;
    }

    .correct {
      background: #2ecc71 !important;
    }

    .wrong {
      background: #e74c3c !important;
    }

    h2 {
      font-family: 'Rubik', Arial, sans-serif;
      color: #ccc;
      margin-top: 30px;
    }

    /* Progress Bar */
    .progress-container {
      width: 300px;
      margin: 20px auto;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar {
      width: 0%;
      height: 10px;
      background: white;
      transition: width 0.3s;
    }

    .progress-text {
      color: #ccc;
      font-size: 14px;
      margin-top: 6px;
    }

    .controls {
      margin-top: 20px;
    }

    @media screen and (max-width: 768px) {
      nav ul {
        flex-direction: column;
        gap: 15px;
      }

      h1 {
        font-size: 50px;
      }

      select,
      button,
      .answer,
      .progress-container {
        width: 80%;
      }
    }
  </style>
</head>

<body data-page="usabo">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <h1>USABO Practice</h1>

  <select id="topicSelect">
    <option value="Cell Biology & Biochemistry">Cell Biology & Biochemistry</option>
    <option value="Anatomy & Physiology">Anatomy & Physiology</option>
    <option value="Genetics">Genetics</option>
    <option value="Plant Biology">Plant Biology</option>
    <option value="Ethology & Ecology">Ethology & Ecology</option>
    <option value="Biosystematics">Biosystematics</option>
  </select>

  <h2 id="question"></h2>
  <div id="answers"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">0/0 questions of [Category] completed</div>
  </div>

  <div class="controls">
    <label>
      <input type="checkbox" id="filterUncompleted" onclick="toggleFilterUncompleted()">
      Show only uncompleted questions
    </label>
    <button onclick="skipQuestion()">Skip Question</button>
    <button onclick="clearProgress()">Clear Progress</button>
  </div>

  <button onclick="nextQuestion()">Next Question</button>

  <script src="questions.js"></script>
  <script src="quiz.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const topicSelect = document.getElementById("topicSelect");
      startQuiz("USABO", topicSelect.value);
      topicSelect.addEventListener("change", (e) => filterTopic(e.target.value));
    });
  </script>

</body>

</html>
