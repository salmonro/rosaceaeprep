<!DOCTYPE html>
<html>
<head>
  <title>AP Biology Practice</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26);
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
      margin: 0;
    }

    nav { margin-bottom: 50px; }
    nav ul { list-style: none; display: flex; justify-content: center; gap: 20px; padding: 0; margin: 0; }
    nav a { color: #d47a9a; font-size: 20px; text-decoration: none; font-weight: bold; transition: color 0.3s; }
    nav a:hover { color: #c75c85; }

    h1 { font-size: 70px; color: #d47a9a; margin-bottom: 20px; }
    select { padding: 8px 12px; font-size: 16px; margin-bottom: 20px; border-radius: 6px; border: none; background: #151a2e; color: white; cursor: pointer; }

    button { background: #d47a9a; border: none; padding: 10px 18px; color: white; border-radius: 6px; cursor: pointer; font-weight: 500; transition: background 0.3s; margin-top: 20px; }
    button:hover { background: #c75c85; }

    #answers { margin-top: 20px; }
    .answer { display: block; margin: 10px auto; padding: 10px; background: #151a2e; border-radius: 6px; cursor: pointer; max-width: 400px; transition: background 0.3s; }
    .correct { background: #2ecc71 !important; }
    .wrong { background: #e74c3c !important; }

    h2 { color: #ccc; margin-top: 30px; display: inline-block; }

    .progress-container { width: 300px; margin: 20px auto; background: rgba(255,255,255,0.1); border-radius: 6px; overflow: hidden; position: relative; }
    .progress-bar { width: 0%; height: 10px; background: white; transition: width 0.3s; }
    .progress-text { color: #ccc; font-size: 14px; margin-top: 6px; }

    #skipBtn { margin-left: 12px; padding: 6px 12px; font-size: 14px; border-radius: 6px; display: none; cursor: pointer; background: #ff8fb3; color: white; border: none; transition: all 0.3s; }
    #skipBtn:hover { background: #e97aa3; }

    @media screen and (max-width: 768px) {
      nav ul { flex-direction: column; gap: 15px; }
      h1 { font-size: 50px; }
      select, button, .answer, .progress-container { width: 80%; }
      h2 { display: block; margin-bottom: 10px; }
      #skipBtn { display: block; margin: 10px auto; }
    }
  </style>
</head>
<body data-page="apbio">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <h1>AP Biology Practice</h1>

  <select id="topicSelect">
    <option value="Unit 1: Chemistry of Life">Unit 1: Chemistry of Life</option>
    <option value="Unit 2: Cell Structure">Unit 2: Cell Structure</option>
    <option value="Unit 3: Cellular Energetics">Unit 3: Cellular Energetics</option>
    <option value="Unit 4: Cell Communication">Unit 4: Cell Communication</option>
    <option value="Unit 5: Heredity">Unit 5: Heredity</option>
    <option value="Unit 6: Gene Expression">Unit 6: Gene Expression</option>
    <option value="Unit 7: Evolution">Unit 7: Evolution</option>
    <option value="Unit 8: Ecology">Unit 8: Ecology</option>
  </select>

  <h2 id="question"></h2>
  <button id="skipBtn" onclick="skipQuestion()">Skip Question</button>
  <div id="answers"></div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">0/0 questions of [Category] completed</div>
  </div>

  <button onclick="nextQuestion()">Next Question</button>
  <button onclick="toggleFilter()">Toggle Completed Filter</button>

  <script src="questions.js"></script>
  <script src="quiz.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const topicSelect = document.getElementById("topicSelect");
      startQuiz("AP Bio", topicSelect.value);
      topicSelect.addEventListener("change", (e) => filterTopic(e.target.value));
    });
  </script>
</body>
</html>
