<!DOCTYPE html>
<html>

<head>
  <title>AP Biology Practice</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Page-specific styling */
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26);
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      padding-top: 100px;
      margin: 0;
    }

    h1 {
      font-size: 60px;
      color: #d47a9a;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 20px;
      color: #ccc;
      margin-bottom: 30px;
    }

    nav {
      margin-bottom: 50px;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0;
      margin: 0;
      flex-wrap: wrap;
    }

    nav a {
      color: #d47a9a;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #c75c85;
    }

    select {
      padding: 10px 14px;
      font-size: 16px;
      margin-bottom: 25px;
      border-radius: 8px;
      border: none;
      background: #151a2e;
      color: white;
      cursor: pointer;
    }

    button {
      background: #ff8fb3;
      border: none;
      padding: 12px 24px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 500;
      transition: all 0.3s;
      margin-top: 20px;
    }

    button:hover {
      background: #ff6fa3;
    }

    #answers {
      margin-top: 20px;
    }

    .answer {
      display: block;
      margin: 12px auto;
      padding: 12px;
      background: #151a2e;
      border-radius: 8px;
      cursor: pointer;
      max-width: 450px;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 400;
      transition: background 0.3s;
    }

    .correct {
      background: #2ecc71 !important;
    }

    .wrong {
      background: #e74c3c !important;
    }

    #progressContainer {
      margin: 20px auto;
      width: 80%;
    }

    #progressText {
      margin-top: 5px;
      font-size: 16px;
      color: #ccc;
    }

    @media screen and (max-width: 768px) {
      h1 {
        font-size: 48px;
      }

      select {
        width: 80%;
      }

      button,
      .answer {
        width: 80%;
      }

      nav ul {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>

<body data-page="apbio">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <h1>AP Biology Practice</h1>
  <p class="subtitle">Select a unit and track your progress!</p>

  <select onchange="filterTopic(this.value)">
    <option value="Unit 1: Chemistry of Life">Unit 1: Chemistry of Life</option>
    <option value="Unit 2: Cell Structure">Unit 2: Cell Structure</option>
    <option value="Unit 3: Cellular Energetics">Unit 3: Cellular Energetics</option>
    <option value="Unit 4: Cell Communication">Unit 4: Cell Communication</option>
    <option value="Unit 5: Heredity">Unit 5: Heredity</option>
    <option value="Unit 6: Gene Expression">Unit 6: Gene Expression</option>
    <option value="Unit 7: Evolution">Unit 7: Evolution</option>
    <option value="Unit 8: Ecology">Unit 8: Ecology</option>
  </select>

  <div id="progressContainer"></div>

  <h2 id="question"></h2>

  <div id="answers"></div>

  <button onclick="nextQuestion()">Next Question</button>

  <script src="questions.js"></script>
  <script src="quiz.js"></script>
  <script>
    startQuiz("AP Bio");
  </script>

</body>

</html>
