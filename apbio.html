<!DOCTYPE html>
<html>

<head>
  <title>AP Biology Practice</title>
  <link rel="stylesheet" href="style.css">
  <style>

  <div class="progress-container">

<div class="progress-text">
<span id="progressText">0/0 questions completed</span>
</div>

<div class="progress-bar-bg">
<div id="progressBar"></div>
</div>

</div>
    /* Page-specific styling */
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26); /* dark gradient */
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }

    nav {
      margin-bottom: 50px;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0;
      margin: 0;
    }

    nav a {
      color: #d47a9a; /* muted pink */
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #c75c85; /* darker hover */
    }

    h1 {
      font-size: 70px;
      color: #d47a9a; /* muted pink */
      margin-bottom: 20px;
    }

    select {
      padding: 8px 12px;
      font-family: 'Rubik', Arial, sans-serif;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: none;
      background: #151a2e;
      color: white;
      cursor: pointer;
    }

    button {
      background: #d47a9a; /* muted pink */
      border: none;
      padding: 10px 18px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 500;
      transition: background 0.3s;
      margin-top: 20px;
    }

    button:hover {
      background: #c75c85; /* darker hover */
    }

    #answers {
      margin-top: 20px;
    }

    .answer {
      display: block;
      margin: 10px auto;
      padding: 10px;
      background: #151a2e;
      border-radius: 6px;
      cursor: pointer;
      max-width: 400px;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 400;
      transition: background 0.3s;
    }

    .correct {
      background: #2ecc71 !important;
    }

    .wrong {
      background: #e74c3c !important;
    }

    h2 {
      font-family: 'Rubik', Arial, sans-serif;
      color: #ccc;
      margin-top: 30px;
    }

    /* Responsive */
    @media screen and (max-width: 768px) {
      nav ul {
        flex-direction: column;
        gap: 15px;
      }

      h1 {
        font-size: 50px;
      }

      select {
        width: 80%;
      }

      button, .answer {
        width: 80%;
      }
    }
  </style>
</head>

<body data-page="apbio">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <h1>AP Biology Practice</h1>

  <select onchange="filterTopic(this.value)">
    <option value="Unit 1: Chemistry of Life">Unit 1: Chemistry of Life</option>
    <option value="Unit 2: Cell Structure">Unit 2: Cell Structure</option>
    <option value="Unit 3: Cellular Energetics">Unit 3: Cellular Energetics</option>
    <option value="Unit 4: Cell Communication">Unit 4: Cell Communication</option>
    <option value="Unit 5: Heredity">Unit 5: Heredity</option>
    <option value="Unit 6: Gene Expression">Unit 6: Gene Expression</option>
    <option value="Unit 7: Evolution">Unit 7: Evolution</option>
    <option value="Unit 8: Ecology">Unit 8: Ecology</option>
  </select>

  <h2 id="question"></h2>

  <div id="answers"></div>

  <button onclick="nextQuestion()">Next Question</button>

  <script src="questions.js"></script>
  <script src="quiz.js"></script>
  <script>
    startQuiz("AP Bio")
  </script>

</body>

</html>
