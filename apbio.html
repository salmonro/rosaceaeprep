<!DOCTYPE html>
<html>

<head>
  <title>USABO Practice</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26);
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding-top: 50px;
    }

    nav {
      margin-bottom: 50px;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0;
      margin: 0;
    }

    nav a {
      color: #d47a9a;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #c75c85;
    }

    h1 {
      font-size: 60px;
      color: #d47a9a;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 20px;
      color: #ccc;
      margin-bottom: 30px;
    }

    select {
      padding: 8px 12px;
      font-family: 'Rubik', Arial, sans-serif;
      font-size: 16px;
      margin-bottom: 20px;
      border-radius: 6px;
      border: none;
      background: #151a2e;
      color: white;
      cursor: pointer;
    }

    button {
      background: #d47a9a;
      border: none;
      padding: 10px 18px;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 500;
      transition: background 0.3s;
      margin-top: 20px;
    }

    button:hover {
      background: #c75c85;
    }

    #answers {
      margin-top: 20px;
    }

    .answer {
      display: block;
      margin: 10px auto;
      padding: 10px;
      background: #151a2e;
      border-radius: 6px;
      cursor: pointer;
      max-width: 400px;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 400;
      transition: background 0.3s;
    }

    .correct {
      background: #2ecc71 !important;
    }

    .wrong {
      background: #e74c3c !important;
    }

    /* Progress bar text */
    #progressText {
      font-size: 14px;
      font-weight: bold;
      margin-top: 5px;
    }

    @media screen and (max-width: 768px) {
      nav ul {
        flex-direction: column;
        gap: 15px;
      }

      h1 {
        font-size: 50px;
      }

      select,
      button,
      .answer {
        width: 80%;
      }
    }
  </style>
</head>

<body data-page="usabo">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>USABO Practice</h1>
    <p class="subtitle">Practice USABO-style questions by topic and track your progress.</p>

    <select onchange="filterTopic(this.value)">
      <option value="Cell Biology & Biochemistry">Cell Biology & Biochemistry</option>
      <option value="Anatomy & Physiology">Anatomy & Physiology</option>
      <option value="Genetics">Genetics</option>
      <option value="Plant Biology">Plant Biology</option>
      <option value="Ethology & Ecology">Ethology & Ecology</option>
      <option value="Biosystematics">Biosystematics</option>
    </select>

  </div>

  <!-- Progress bar -->
  <div id="progressContainer"></div>

  <h2 id="question"></h2>

  <div id="answers"></div>

  <button onclick="nextQuestion()">Next Question</button>

  <script src="questions.js"></script>
  <script src="quiz.js"></script>
  <script>
    startQuiz("USABO");
  </script>

</body>

</html>
