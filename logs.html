<!DOCTYPE html>
<html>

<head>
  <title>Server Announcements</title>
  <link rel="stylesheet" href="style.css">

  <style>
    /* Apple-style polished background */
    body {
      margin: 0;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      color: white;

      background:
        radial-gradient(circle at 20% 25%, #2a1a33 0%, transparent 40%),
        radial-gradient(circle at 80% 75%, #1a2a4a 0%, transparent 45%),
        radial-gradient(circle at 50% 90%, #1a0f2a 0%, transparent 40%),
        linear-gradient(180deg, #111321 0%, #0b0d18 100%);

      min-height: 100vh;
      padding-top: 120px;
    }

    /* Navbar */
    nav {
      margin-bottom: 60px;
    }

    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 10px;
    }

    nav li {
      position: relative;
      padding: 0 10px;
    }

    nav li::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 143, 179, 0.6);
      border-radius: 1px;
      opacity: 0.6;
    }

    nav a {
      color: #d47a9a;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #c75c85;
    }

    /* Title */
    h1 {
      font-size: 70px;
      margin-bottom: 60px;

      background: linear-gradient(to right, #f4b6cc, #e97aa3, #a6456c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow:
        0 0 6px rgba(255,120,170,0.5),
        0 0 14px rgba(255,120,170,0.35),
        0 0 24px rgba(255,120,170,0.25);
    }

    /* Glassy Discord card */
    .discord-card {
      max-width: 600px;
      margin: 0 auto 120px auto;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 40px 30px;
      backdrop-filter: blur(14px);
      transition: all 0.3s;
    }

    .discord-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 25px rgba(255, 143, 179, 0.35);
    }

    .discord-card iframe {
      width: 100%;
      height: 500px;
      border-radius: 12px;
      border: none;
    }

    /* Mobile */
    @media screen and (max-width: 768px) {
      h1 {
        font-size: 50px;
      }

      nav ul {
        flex-direction: column;
        gap: 15px;
      }

      .discord-card {
        width: 90%;
        padding: 35px 20px;
      }

      .discord-card iframe {
        height: 400px;
      }
    }
  </style>
</head>

<body data-page="logs">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <h1>Server Announcements</h1>

  <div class="discord-card">
    <!-- Replace YOUR_SERVER_ID with your actual Discord server ID -->
    <iframe src="https://discord.com/widget?id=YOUR_SERVER_ID&theme=dark"></iframe>
  </div>

</body>

</html>
