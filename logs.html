<!DOCTYPE html>
<html>

<head>
  <title>Server Announcements</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Match site styling */
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26); /* dark gradient */
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }

    nav {
      margin-bottom: 50px;
    }

    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 0;
    }

    nav a {
      color: #d47a9a; /* muted pink */
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #c75c85; /* slightly darker hover */
    }

    h1 {
      font-size: 70px;
      color: #d47a9a; /* muted pink */
      margin-bottom: 30px;
    }

    iframe {
      border: none;
      border-radius: 12px;
      margin-top: 30px;
    }

    /* Responsive */
    @media screen and (max-width: 768px) {
      nav ul {
        flex-direction: column;
        gap: 15px;
      }

      h1 {
        font-size: 50px;
      }

      iframe {
        width: 90%;
        height: 400px;
      }
    }
  </style>
</head>
