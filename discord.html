<!DOCTYPE html>
<html>

<head>
  <title>Join the Discord</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26);
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      padding-top: 120px;
      margin: 0;
    }

    nav {
      margin-bottom: 50px;
      z-index: 1;
      position: relative;
    }

    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 10px;
    }

    nav li {
      position: relative;
      padding: 0 10px;
    }

    nav li::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 143, 179, 0.6);
      border-radius: 1px;
      opacity: 0.6;
    }

    nav a {
      color: #d47a9a;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #c75c85;
    }

    h1 {
      font-size: 70px;
      background: linear-gradient(to right, #ffe3ef, #ff8fb3, #b8326a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 0 8px rgba(255,120,170,0.8),
        0 0 18px rgba(255,120,170,0.6),
        0 0 32px rgba(255,120,170,0.4);
      margin-bottom: 40px;
    }

    .discord-card {
      max-width: 500px;
      margin: 0 auto 100px auto;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 50px 30px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }

    .discord-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 25px rgba(255, 143, 179, 0.3);
    }

    .discord-card p {
      font-size: 20px;
      color: #ccc;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .discord-card a button {
      padding: 14px 32px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      background: #d47a9a;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 143, 179, 0.5);
      transition: all 0.3s;
    }

    .discord-card a button:hover {
      background: #c75c85;
      box-shadow: 0 0 25px rgba(255, 143, 179, 0.8);
    }

    @media screen and (max-width: 768px) {
      h1 {
        font-size: 50px;
      }

      nav ul {
        flex-direction: column;
        gap: 15px;
      }

      .discord-card {
        padding: 40px 20px;
        width: 90%;
      }

      .discord-card a button {
        width: 80%;
      }
    }
  </style>
</head>

<body data-page="discord">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <h1>Join the Discord</h1>

  <div class="discord-card">
    <p>Join the server for regular updates, Q&A, and USABO/AP Bio discussion!</p>
    <a href="https://discord.gg/gKQQjMTyRk" target="_blank">
      <button>Join Server</button>
    </a>
  </div>

</body>

</html>
