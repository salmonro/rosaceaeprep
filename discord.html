<!DOCTYPE html>
<html>

<head>
  <title>Join the Discord</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Page-specific styling */
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26); /* dark gradient */
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }

    nav {
      margin-bottom: 50px;
    }

    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 0;
      margin: 0;
    }

    nav a {
      color: #d47a9a; /* muted pink */
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #c75c85; /* slightly darker hover */
    }

    h1 {
      font-size: 70px;
      color: #d47a9a; /* muted pink */
      margin-bottom: 20px;
    }

    p {
      font-size: 22px;
      color: #ccc;
      margin-bottom: 30px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    a button {
      margin-top: 20px;
      padding: 12px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background-color: #d47a9a; /* muted pink */
      color: white;
      cursor: pointer;
      font-family: 'Rubik', Arial, sans-serif;
      font-weight: 500;
      transition: background 0.3s;
    }

    a button:hover {
      background-color: #c75c85; /* slightly darker hover */
    }

    /* Responsive */
    @media screen and (max-width: 768px) {
      nav ul {
        flex-direction: column;
        gap: 15px;
      }

      h1 {
        font-size: 50px;
      }

      a button {
        width: 80%;
      }
    }
  </style>
</head>

<body data-page="discord">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <h1>Join the Discord</h1>
  <p>Click below to join our server for regular updates!</p>

  <a href="https://discord.gg/gKQQjMTyRk" target="_blank">
    <button>Join Server</button>
  </a>

</body>

</html>
