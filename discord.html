<!DOCTYPE html>
<html>

<head>
  <title>Join the Discord</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0b0f1a, #11162b, #1a0b26);
      color: white;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      margin: 0;
      padding-top: 120px;
    }

    nav {
      margin-bottom: 50px;
      position: relative;
      z-index: 1;
    }

    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 30px;
      flex-wrap: wrap;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 10px;
    }

    nav li {
      position: relative;
      padding: 0 10px;
    }

    nav li::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(255, 143, 179, 0.6);
      border-radius: 1px;
      opacity: 0.6;
    }

    nav a {
      color: #d47a9a;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #c75c85;
    }

    h1 {
      font-size: 70px;
      margin-bottom: 40px;

      background: linear-gradient(to right, #f4b6cc, #e97aa3, #a6456c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow:
        0 0 6px rgba(255,120,170,0.5),
        0 0 14px rgba(255,120,170,0.35),
        0 0 24px rgba(255,120,170,0.25);
    }

    p {
      font-size: 22px;
      color: #ccc;
      max-width: 700px;
      margin: 0 auto 40px auto;
      line-height: 1.6;
    }

    .discord-card {
      background: rgba(255, 255, 255, 0.04);
      padding: 30px 25px;
      border-radius: 12px;
      width: 320px;
      margin: 0 auto 80px auto;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s;
    }

    .discord-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 20px rgba(255, 143, 179, 0.3);
    }

    .discord-card button {
      margin-top: 20px;
      padding: 14px 32px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #d47a9a;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 10px rgba(212, 122, 154, 0.5);
      animation: glowPulse 2s infinite alternate;
    }

    .discord-card button:hover {
      background: #c75c85;
      box-shadow: 0 0 25px rgba(212, 122, 154, 0.8);
      animation: none; /* Stop pulsing on hover for stable glow */
    }

    /* Glow pulse animation */
    @keyframes glowPulse {
      0% {
        box-shadow: 0 0 6px rgba(212, 122, 154, 0.4),
                    0 0 12px rgba(212, 122, 154, 0.25);
      }
      50% {
        box-shadow: 0 0 12px rgba(212, 122, 154, 0.6),
                    0 0 24px rgba(212, 122, 154, 0.35);
      }
      100% {
        box-shadow: 0 0 6px rgba(212, 122, 154, 0.4),
                    0 0 12px rgba(212, 122, 154, 0.25);
      }
    }

    @media screen and (max-width: 768px) {
      nav ul {
        flex-direction: column;
        gap: 15px;
      }

      h1 {
        font-size: 50px;
      }

      .discord-card button {
        width: 80%;
      }
    }
  </style>
</head>

<body data-page="discord">

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <h1>Join the Discord</h1>

  <div class="discord-card">
    <p>Join the server for regular updates and news!</p>
    <a href="https://discord.gg/gKQQjMTyRk" target="_blank">
      <button>Join Server</button>
    </a>
  </div>

</body>

</html>
