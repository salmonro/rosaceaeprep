<!DOCTYPE html>
<html>

<head>
  <title>Login / Create Account</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: 'Rubik', Arial, sans-serif;
      text-align: center;
      color: white;
      background:
        radial-gradient(circle at 20% 25%, #2a1a33 0%, transparent 40%),
        radial-gradient(circle at 80% 75%, #1a2a4a 0%, transparent 45%),
        radial-gradient(circle at 50% 90%, #1a0f2a 0%, transparent 40%),
        linear-gradient(180deg, #111321 0%, #0b0d18 100%);
      min-height: 100vh;
      padding-top: 100px;
    }

    nav {
      margin-bottom: 50px;
    }

    nav ul {
      list-style: none;
      padding: 0;
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      border-bottom: 2px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 10px;
    }

    nav a {
      color: #d47a9a;
      font-size: 20px;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #c75c85;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px);
      padding: 40px 35px;
      margin: 0 auto;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 143, 179, 0.2);
    }

    .card h1 {
      font-size: 36px;
      margin-bottom: 25px;
      background: linear-gradient(to right, #f4b6cc, #e97aa3, #a6456c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 6px rgba(255, 120, 170, 0.5);
    }

    .card input {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border-radius: 8px;
      border: none;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 16px;
    }

    .card button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #ff8fb3;
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 143, 179, 0.6);
      transition: all 0.3s;
    }

    .card button:hover {
      background: #ff6fa3;
      box-shadow: 0 0 25px rgba(255, 143, 179, 1);
    }

    .message {
      color: #ccc;
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="usabo.html">USABO</a></li>
      <li><a href="apbio.html">AP Bio</a></li>
      <li><a href="studyguides.html">Study Guides</a></li>
      <li><a href="discord.html">Join the Discord</a></li>
      <li><a href="logs.html">Logs</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="card">
    <h1>Account Login</h1>
    <input type="text" id="username" placeholder="Username" />
    <button onclick="login()">Login / Create Account</button>
    <div class="message" id="loginMessage"></div>
  </div>

  <script>
    function login() {
      const username = document.getElementById("username").value.trim();
      const message = document.getElementById("loginMessage");
      if (!username) {
        message.innerText = "Please enter a username!";
        return;
      }
      localStorage.setItem("currentUser", username);
      message.innerText = "Logged in as " + username;
      setTimeout(() => window.location.href = "usabo.html", 1000);
    }
  </script>

</body>

</html>
